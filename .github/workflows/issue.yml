name: AI Issue Assistant

on:
  issues:
    types:
      - opened
      - reopened
      - edited
  issue_comment:
    types:
      - created

permissions:
  contents: read
  issues: write
  models: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    concurrency:
      group: issue-assistant-${{ github.repository }}-${{ github.event.issue.number }}
      cancel-in-progress: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare issue context and pending comment
        id: prepare
        uses: actions/github-script@v7
        env:
          ISSUE_OPENAI_COMPAT_ENDPOINT: ${{ vars.ISSUE_OPENAI_COMPAT_ENDPOINT }}
          ISSUE_OPENAI_COMPAT_TOKEN: ${{ secrets.ISSUE_OPENAI_COMPAT_TOKEN }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issueNumber = context.payload.issue?.number;

            if (!issueNumber) {
              core.setOutput('should_run', 'false');
              core.info('Skip: no issue number in event payload.');
              return;
            }

            const issueResp = await github.rest.issues.get({
              owner,
              repo,
              issue_number: issueNumber
            });
            const issue = issueResp.data;

            if (issue.pull_request) {
              core.setOutput('should_run', 'false');
              core.info('Skip: pull request conversation is not supported.');
              return;
            }

            const lowerLabels = (issue.labels || []).map(label =>
              String(typeof label === 'string' ? label : label.name || '').toLowerCase()
            );

            let triggerReason = '';
            let shouldRun = false;

            if (context.eventName === 'issues') {
              const action = context.payload.action;
              if (['opened', 'reopened', 'edited'].includes(action)) {
                shouldRun = true;
                triggerReason = {
                  opened: 'Issue 新建，进行首次 AI 初步分析。',
                  reopened: 'Issue 被重新打开，重新进行 AI 初步分析。',
                  edited: 'Issue 标题或正文有更新，重新进行 AI 初步分析。'
                }[action] || 'Issue 内容发生变更，重新进行 AI 初步分析。';
              }
            }

            if (context.eventName === 'issue_comment') {
              const comment = context.payload.comment;
              const commentBody = String(comment?.body || '').trim();
              const commenter = String(comment?.user?.login || '').toLowerCase();
              const issueAuthor = String(issue.user?.login || '').toLowerCase();
              const issueState = String(issue.state || '').toLowerCase();
              const hasNeedsInfo = lowerLabels.includes('needs-info');
              const manualRerun = /^\/(ai-rerun|triage|analyze)\b/im.test(commentBody);

              if (issueState !== 'open') {
                core.setOutput('should_run', 'false');
                core.info('Skip: issue is not open.');
                return;
              }

              let hasRepoPermission = false;
              try {
                const permResp = await github.rest.repos.getCollaboratorPermissionLevel({
                  owner,
                  repo,
                  username: comment.user.login
                });
                hasRepoPermission = ['admin', 'maintain', 'write', 'triage'].includes(
                  String(permResp.data.permission || '').toLowerCase()
                );
              } catch (error) {
                core.info(`Permission check skipped: ${error.message}`);
              }

              if (commenter && commenter === issueAuthor && hasNeedsInfo) {
                shouldRun = true;
                triggerReason = '提问者在 needs-info 状态下补充了信息，重新进行 AI 初步分析。';
              } else if (manualRerun && (hasRepoPermission || commenter === issueAuthor)) {
                shouldRun = true;
                triggerReason = '收到 /ai-rerun、/triage 或 /analyze 指令，重新进行 AI 初步分析。';
              }
            }

            if (!shouldRun) {
              core.setOutput('should_run', 'false');
              core.info('Skip: event does not require issue analysis.');
              return;
            }

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: issueNumber,
              per_page: 100
            });

            const marker = '<!-- maltose-ai-analysis -->';
            const existingComment = [...comments].reverse().find(comment => {
              const body = String(comment.body || '');
              return body.includes(marker) && String(comment.user?.type || '') === 'Bot';
            });

            const pendingLines = [
              '## 🤖 AI 分析进行中',
              '',
              '正在分析该 Issue 并生成总结与标签建议，请稍候…',
              '',
              '如本次是补充信息后的重跑，我会直接覆盖上一条 AI 分析评论。',
              marker
            ];

            let commentId = 0;
            if (existingComment) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existingComment.id,
                body: pendingLines.join('\n')
              });
              commentId = existingComment.id;
            } else {
              const createResp = await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issueNumber,
                body: pendingLines.join('\n')
              });
              commentId = createResp.data.id;
            }

            const openIssuesResp = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: 'open',
              per_page: 100
            });
            const openIssues = openIssuesResp
              .filter(item => !item.pull_request && item.number !== issueNumber)
              .slice(0, 50);

            const openIssueNumbers = openIssues.map(item => item.number);
            const openIssueSummary = openIssues.length
              ? openIssues.map(item => {
                  const labels = (item.labels || [])
                    .map(label => String(typeof label === 'string' ? label : label.name || '').trim())
                    .filter(Boolean)
                    .join(', ');
                  const body = String(item.body || '')
                    .replace(/\s+/g, ' ')
                    .slice(0, 180);
                  return `#${item.number} | ${item.title} | labels=[${labels}] | body=${body}`;
                }).join('\n')
              : '（当前没有其他 open issues）';

            const recentComments = comments.length
              ? comments.slice(-10).map(comment => {
                  const author = comment.user?.login || 'unknown';
                  const body = String(comment.body || '')
                    .replace(/\s+/g, ' ')
                    .slice(0, 300);
                  return `${author}: ${body}`;
                }).join('\n')
              : '（暂无评论）';

            const baseDir = process.env.RUNNER_TEMP || process.cwd();
            const bodyFile = path.join(baseDir, `issue-${issueNumber}-body.md`);
            const openIssuesFile = path.join(baseDir, `issue-${issueNumber}-open-issues.txt`);
            const commentsFile = path.join(baseDir, `issue-${issueNumber}-comments.txt`);

            fs.writeFileSync(bodyFile, String(issue.body || '（无正文）'));
            fs.writeFileSync(openIssuesFile, openIssueSummary);
            fs.writeFileSync(commentsFile, recentComments);

            const currentLabels = (issue.labels || [])
              .map(label => String(typeof label === 'string' ? label : label.name || '').trim())
              .filter(Boolean)
              .join(', ') || '（无）';

            core.setOutput('should_run', 'true');
            core.setOutput('comment_id', String(commentId));
            core.setOutput('issue_number', String(issueNumber));
            core.setOutput('issue_title', issue.title);
            core.setOutput('current_labels', currentLabels);
            core.setOutput('trigger_reason', triggerReason);
            core.setOutput('issue_body_file', bodyFile);
            core.setOutput('open_issues_file', openIssuesFile);
            core.setOutput('recent_comments_file', commentsFile);
            core.setOutput('open_issue_numbers', JSON.stringify(openIssueNumbers));
            core.setOutput(
              'use_custom_endpoint',
              process.env.ISSUE_OPENAI_COMPAT_ENDPOINT && process.env.ISSUE_OPENAI_COMPAT_TOKEN ? 'true' : 'false'
            );

      - name: Skip irrelevant event
        if: ${{ steps.prepare.outputs.should_run != 'true' }}
        run: echo "issue analysis skipped for this event."

      - name: Run AI inference with custom endpoint
        if: ${{ steps.prepare.outputs.should_run == 'true' && steps.prepare.outputs.use_custom_endpoint == 'true' }}
        id: inference_custom
        continue-on-error: true
        uses: actions/ai-inference@v1
        with:
          prompt-file: ./.github/prompts/general-intake.prompt.yml
          input: |
            trigger_reason: |
              ${{ steps.prepare.outputs.trigger_reason }}
            current_labels: |
              ${{ steps.prepare.outputs.current_labels }}
            issue_title: |
              ${{ steps.prepare.outputs.issue_title }}
          file_input: |
            issue_body: ${{ steps.prepare.outputs.issue_body_file }}
            recent_comments: ${{ steps.prepare.outputs.recent_comments_file }}
            open_issues: ${{ steps.prepare.outputs.open_issues_file }}
          endpoint: ${{ vars.ISSUE_OPENAI_COMPAT_ENDPOINT }}
          token: ${{ secrets.ISSUE_OPENAI_COMPAT_TOKEN }}
          custom-headers: ${{ vars.ISSUE_OPENAI_COMPAT_HEADERS }}

      - name: Run AI inference with GitHub Models
        if: ${{ steps.prepare.outputs.should_run == 'true' && steps.prepare.outputs.use_custom_endpoint != 'true' }}
        id: inference_github_models
        continue-on-error: true
        uses: actions/ai-inference@v1
        with:
          prompt-file: ./.github/prompts/general-intake.prompt.yml
          input: |
            trigger_reason: |
              ${{ steps.prepare.outputs.trigger_reason }}
            current_labels: |
              ${{ steps.prepare.outputs.current_labels }}
            issue_title: |
              ${{ steps.prepare.outputs.issue_title }}
          file_input: |
            issue_body: ${{ steps.prepare.outputs.issue_body_file }}
            recent_comments: ${{ steps.prepare.outputs.recent_comments_file }}
            open_issues: ${{ steps.prepare.outputs.open_issues_file }}

      - name: Normalize AI result
        if: ${{ steps.prepare.outputs.should_run == 'true' }}
        id: normalize
        uses: actions/github-script@v7
        env:
          AI_RESPONSE_FILE: ${{ steps.inference_custom.outputs.response-file || steps.inference_github_models.outputs.response-file }}
          OPEN_ISSUE_NUMBERS: ${{ steps.prepare.outputs.open_issue_numbers }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            const fail = (message) => {
              core.setOutput('ok', 'false');
              core.setOutput('error', String(message || 'unknown-error').slice(0, 1000));
            };

            const parseJson = (raw) => {
              const text = String(raw || '').trim();
              if (!text) {
                throw new Error('empty-ai-response');
              }
              try {
                return JSON.parse(text);
              } catch {
                const first = text.indexOf('{');
                const last = text.lastIndexOf('}');
                if (first >= 0 && last > first) {
                  return JSON.parse(text.slice(first, last + 1));
                }
                throw new Error('invalid-json-response');
              }
            };

            const safeString = (value, maxLength) =>
              String(value || '')
                .replace(/\s+/g, ' ')
                .trim()
                .slice(0, maxLength);

            try {
              const responseFile = String(process.env.AI_RESPONSE_FILE || '').trim();
              if (!responseFile) {
                fail('missing-ai-response-file');
                return;
              }

              const raw = fs.readFileSync(responseFile, 'utf8');
              const parsed = parseJson(raw);
              const allowedCategories = new Set(['bug', 'question', 'enhancement', 'documentation']);
              const allowedDispositions = new Set(['duplicate', 'none']);
              const openIssueNumbers = new Set(JSON.parse(process.env.OPEN_ISSUE_NUMBERS || '[]').map(Number));

              const result = {
                summary: safeString(parsed.summary, 180) || '已完成自动分析，请维护者结合上下文继续判断。',
                category: allowedCategories.has(String(parsed.category || '').toLowerCase())
                  ? String(parsed.category).toLowerCase()
                  : 'question',
                disposition: allowedDispositions.has(String(parsed.disposition || '').toLowerCase())
                  ? String(parsed.disposition).toLowerCase()
                  : 'none',
                needsInfo: Boolean(parsed.needsInfo),
                infoAssessment: safeString(parsed.infoAssessment, 220) || '当前信息基本足够进行初步分析。',
                supplementSuggestions: Array.isArray(parsed.supplementSuggestions)
                  ? parsed.supplementSuggestions.map(item => safeString(item, 120)).filter(Boolean).slice(0, 3)
                  : [],
                titleSuggestion: safeString(parsed.titleSuggestion, 120),
                duplicateOf: parsed.duplicateOf == null ? null : Number(parsed.duplicateOf),
                confidence: Number(parsed.confidence)
              };

              if (!Number.isFinite(result.confidence)) {
                result.confidence = 0.65;
              }
              result.confidence = Math.max(0, Math.min(1, result.confidence));

              if (result.disposition !== 'none') {
                result.needsInfo = false;
                result.supplementSuggestions = [];
              }

              if (result.disposition === 'duplicate') {
                if (!Number.isFinite(result.duplicateOf) || !openIssueNumbers.has(result.duplicateOf)) {
                  result.disposition = 'none';
                  result.duplicateOf = null;
                }
              } else {
                result.duplicateOf = null;
              }

              const labels = [];
              if (result.disposition !== 'none') {
                labels.push(result.disposition);
              } else {
                labels.push(result.category);
                if (result.needsInfo) {
                  labels.push('needs-info');
                }
              }

              result.labels = labels;

              core.setOutput('ok', 'true');
              core.setOutput('json', JSON.stringify(result));
              core.setOutput('error', '');
            } catch (error) {
              fail(error.message || error);
            }

      - name: Apply analysis labels
        if: ${{ steps.prepare.outputs.should_run == 'true' && steps.normalize.outputs.ok == 'true' }}
        uses: actions/github-script@v7
        env:
          TRIAGE_RESULT: ${{ steps.normalize.outputs.json }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issueNumber = Number(context.payload.issue.number);

            const latestIssue = await github.rest.issues.get({
              owner,
              repo,
              issue_number: issueNumber
            });
            const issue = latestIssue.data;

            const result = JSON.parse(process.env.TRIAGE_RESULT);
            const desiredLabels = new Set(Array.isArray(result.labels) ? result.labels : []);
            const currentLabels = (issue.labels || []).map(label =>
              String(typeof label === 'string' ? label : label.name || '')
            );

            const typeLabels = ['bug', 'question', 'enhancement', 'documentation'];
            const dispositionLabels = ['duplicate'];
            const managedLabels = [...typeLabels, ...dispositionLabels, 'needs-info'];

            const removeIfExists = async (name) => {
              try {
                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  name
                });
              } catch (error) {
                core.info(`Skip removing label ${name}: ${error.message}`);
              }
            };

            for (const name of currentLabels) {
              const lower = name.toLowerCase();
              const isManaged = managedLabels.includes(lower) || lower.startsWith('ai:');
              if (isManaged && !desiredLabels.has(lower)) {
                await removeIfExists(name);
              }
            }

            const missingLabels = Array.from(desiredLabels).filter(name =>
              !currentLabels.some(current => current.toLowerCase() === name.toLowerCase())
            );

            if (missingLabels.length > 0) {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: issueNumber,
                labels: missingLabels
              });
            }

      - name: Publish analysis comment
        if: ${{ steps.prepare.outputs.should_run == 'true' && steps.normalize.outputs.ok == 'true' }}
        uses: actions/github-script@v7
        env:
          TRIAGE_RESULT: ${{ steps.normalize.outputs.json }}
          COMMENT_ID: ${{ steps.prepare.outputs.comment_id }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issueNumber = Number(context.payload.issue.number);
            const commentId = Number(process.env.COMMENT_ID || 0);
            const result = JSON.parse(process.env.TRIAGE_RESULT);

            const lines = [
              '## 🤖 AI 初步分析结果',
              '',
              `- **问题概述**: ${result.summary}`,
              `- **建议标签**: ${result.labels.map(label => `\`${label}\``).join(' ') || '（无）'}`,
              `- **建议标题**: ${result.titleSuggestion || context.payload.issue.title}`,
              `- **信息完整度**: ${result.infoAssessment}`,
              `- **置信度**: ${Math.round(Number(result.confidence || 0) * 100)}%`
            ];

            if (result.duplicateOf) {
              lines.push(`- **可能重复于**: #${result.duplicateOf}`);
            }

            if (Array.isArray(result.supplementSuggestions) && result.supplementSuggestions.length > 0) {
              lines.push('');
              lines.push(result.needsInfo ? '### 建议补充' : '### 可选补充');
              for (const item of result.supplementSuggestions) {
                lines.push(`- ${item}`);
              }
            }

            lines.push('');
            lines.push('本次结果已同步到当前 Issue 标签。维护者仍可按实际情况直接调整。');
            lines.push('如后续补充了信息：');
            lines.push('- 提问者在 `needs-info` 状态下直接回复，我会自动重新分析。');
            lines.push('- 维护者或提问者也可以评论 `/ai-rerun`、`/triage` 或 `/analyze` 手动重跑。');
            lines.push('');
            lines.push('<!-- maltose-ai-analysis -->');

            await github.rest.issues.updateComment({
              owner,
              repo,
              comment_id: commentId,
              body: lines.join('\n')
            });

      - name: Publish fallback comment
        if: ${{ steps.prepare.outputs.should_run == 'true' && steps.normalize.outputs.ok != 'true' }}
        uses: actions/github-script@v7
        env:
          COMMENT_ID: ${{ steps.prepare.outputs.comment_id }}
          TRIAGE_ERROR: ${{ steps.normalize.outputs.error }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const commentId = Number(process.env.COMMENT_ID || 0);
            const reason = String(process.env.TRIAGE_ERROR || 'unknown-error')
              .replace(/`/g, '\\`')
              .slice(0, 1000);

            const body = [
              '## ⚠️ AI 初步分析暂时失败',
              '',
              '本次自动分析未成功完成，可能是模型调用失败、返回格式异常或网络波动导致。',
              `- **诊断信息**: \`${reason}\``,
              '',
              '你可以稍后编辑 Issue，或评论 `/ai-rerun`、`/triage`、`/analyze` 再试一次。',
              '维护者也可以直接手动打标签，不影响正常处理。',
              '',
              '<!-- maltose-ai-analysis -->'
            ].join('\n');

            await github.rest.issues.updateComment({
              owner,
              repo,
              comment_id: commentId,
              body
            });
