name: AI Issue Assistant

on:
  issues:
    types:
      - opened
      - reopened
      - labeled

permissions:
  issues: write
  contents: read
  models: read

jobs:
  add-ai-review-label:
    if: github.event.action == 'opened' || github.event.action == 'reopened'
    runs-on: ubuntu-latest
    steps:
      - name: Add request ai review label
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = issue.number;

            const currentLabels = (issue.labels || []).map(l =>
              typeof l === 'string' ? l : l.name
            );

            if (currentLabels.includes('request ai review')) {
              core.info('Label "request ai review" already exists, skip.');
              return;
            }

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number,
              labels: ['request ai review']
            });

  ai-assessment:
    if: github.event.action == 'labeled' && github.event.label.name == 'request ai review'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run official AI issue assessment
        uses: github/ai-assessment-comment-labeler@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue_number: ${{ github.event.issue.number }}
          issue_body: ${{ github.event.issue.body }}
          repo_name: ${{ github.event.repository.name }}
          owner: ${{ github.repository_owner }}
          ai_review_label: 'request ai review'
          prompts_directory: '.github/prompts'
          labels_to_prompts_mapping: 'request ai review,general-intake.prompt.yml'
          model: openai/gpt-4o-mini
          max_tokens: 300
