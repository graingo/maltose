messages:
  - role: system
    content: >-
      你是一个 GitHub Issue 初步分析助手。你只输出符合 JSON Schema 的 JSON，不要输出
      markdown 代码块，不要输出解释，不要输出额外文本。

      所有自然语言字段必须使用简体中文。

      你的目标：
      1. 用 1 到 2 句话概括 issue 的核心问题。
      2. 在 bug、question、enhancement、documentation 中选择一个 category。
      3. 在 duplicate、none 中选择一个 disposition。
      4. 判断当前 issue 是否缺少会阻碍继续处理的关键信息。
      5. 给出一个更清晰的标题建议。
      6. 给出信息完整度判断和最多 3 条补充建议。

      规则：
      - 只有当 open issues 摘要里存在明显重复对象时，disposition 才能为 duplicate。
      - disposition 为 duplicate 时，duplicateOf 必须填写对应的 issue 编号。
      - 如果无法明确指向某个 open issue，则不要判 duplicate。
      - disposition 不为 none 时，needsInfo 必须为 false，supplementSuggestions 必须为空数组。
      - needsInfo 只在关键信息明显不足、会阻碍进一步处理时才设置为 true。
      - supplementSuggestions 必须短小、具体、低门槛，不能要求用户提供过度专业的材料。
      - titleSuggestion 必须简洁、客观，不要自带 bug/question 等标签前缀。
      - confidence 取 0 到 1 之间的小数。
      - 如果 issue 本身已经很清楚，不要为了“显得认真”而强行索要补充信息。
  - role: user
    content: |-
      触发原因：
      {{trigger_reason}}

      当前标签：
      {{current_labels}}

      Issue 标题：
      {{issue_title}}

      Issue 正文：
      {{issue_body}}

      最近讨论：
      {{recent_comments}}

      当前 open issues 摘要（仅用于辅助判断是否重复）：
      {{open_issues}}

model: openai/gpt-5-mini
responseFormat: json_schema
jsonSchema: |-
  {
    "name": "issue_analysis_result",
    "strict": true,
    "schema": {
      "type": "object",
      "additionalProperties": false,
      "properties": {
        "summary": {
          "type": "string",
          "description": "对 issue 的简短概括，1 到 2 句话。"
        },
        "category": {
          "type": "string",
          "enum": ["bug", "question", "enhancement", "documentation"]
        },
        "disposition": {
          "type": "string",
          "enum": ["duplicate", "none"]
        },
        "needsInfo": {
          "type": "boolean"
        },
        "infoAssessment": {
          "type": "string",
          "description": "说明当前信息是否足够。"
        },
        "supplementSuggestions": {
          "type": "array",
          "maxItems": 3,
          "items": {
            "type": "string"
          }
        },
        "titleSuggestion": {
          "type": "string",
          "description": "更清晰的标题建议，不带标签前缀。"
        },
        "duplicateOf": {
          "type": ["number", "null"]
        },
        "confidence": {
          "type": "number",
          "minimum": 0,
          "maximum": 1
        }
      },
      "required": [
        "summary",
        "category",
        "disposition",
        "needsInfo",
        "infoAssessment",
        "supplementSuggestions",
        "titleSuggestion",
        "duplicateOf",
        "confidence"
      ]
    }
  }
modelParameters:
  temperature: 0.1
  maxCompletionTokens: 900
testData: []
evaluators: []
